# Petzara-Backend — CI API (sem VITE_* nem Playwright)
name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: install-lint-test-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint / static validation
        run: npm run lint:ci

      - name: Test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
          REFRESH_SECRET: test-refresh-secret-at-least-32-characters
          EMAIL_USER: ci-test@example.com
          BASE_URL: http://127.0.0.1:5050
          CLIENT_URL: http://127.0.0.1:5173
          STRIPE_SECRET_KEY: sk_test_ci_dummy_key_32_chars_min
          STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_secret_value_here
          RESEND_API_KEY: re_ci_dummy_placeholder
        run: npm test
